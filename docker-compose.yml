version: '3.8'

services:
  youtube-wallgarden:
    image: youtube-wallgarden:latest
    container_name: youtube-wallgarden
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      # The in-container sync API stores everything in a self-contained SQLite
      # file on the volume below — no external database.
      - WALLGARDEN_DB_PATH=/data/wallgarden.db
    volumes:
      # Persists the sync DB across redeploys (compose down/up keeps named volumes).
      - wallgarden-data:/data

volumes:
  wallgarden-data:
