; Runs nginx (static site + reverse proxies) and the Python sync API together in
; the single youtube-wallgarden container. nginx proxies /sync/ -> 127.0.0.1:8017.
[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:sync]
command=uvicorn main:app --host 127.0.0.1 --port 8017
directory=/app/sync
autorestart=true
startretries=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
